# PDF/LaTeX-only settings — merged on top of shared-meta.yaml for PDF builds only.

documentclass: article

# US Letter, asymmetric margins. Wider left margin = quiet channel for breathing room.
# Switch paper=a4paper and scale margins proportionally for non-North-America audiences.
geometry: "top=0.9in, bottom=1in, right=1in, left=1.25in, paper=letterpaper"

# colorlinks=true keeps hyperref using coloured text (no boxes).
# Specific colours are set in titlepage.tex via \AtBeginDocument{\hypersetup{...}}.
colorlinks: true

toc: true
toc-depth: 3
