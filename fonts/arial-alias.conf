<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!--
    Replace "Arial" family requests with "Liberation Sans" at the pattern level.
    <alias> + <prefer> is not enough for XeLaTeX/fontspec — it needs a hard
    family-name substitution so fc-match returns Liberation Sans directly.

    This becomes a no-op if real Arial fonts are installed (fontconfig finds
    the real font before the substitution fires via binding="weak").
  -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>Arial</string>
    </test>
    <edit name="family" mode="prepend" binding="weak">
      <string>Liberation Sans</string>
    </edit>
  </match>
</fontconfig>
